# CodeRabbit Configuration File
# Learn more: https://coderabbit.ai/docs
language: "en-US"
early_access: false
reviews:
  profile: "chill" # The tone of the review (chill, aggressive, standard)
  request_changes_workflow: false
  high_level_summary: true
  poem: true # Adds a fun summary poem at the end of the review!
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
